body:
  text: 競平王就鄭壽訊之於宗廟曰禍敗陷動於楚邦懼鬼神以為怒使先王無所歸吾何改而可鄭壽始不敢答王固猷之答如毀新都戚陵臨陽殺左尹宛少師無忌王曰不能鄭壽如不能君王與楚邦懼難鄭壽告有疾不事陳明歲王復見鄭壽鄭壽出據路以須王與之語少少王笑曰前冬言曰邦必喪我及今何若
  hash: sha256:6576118a2ad3faa9f1e5f5bf008e415338cf304cac306d28e6047f583abcc0ae
